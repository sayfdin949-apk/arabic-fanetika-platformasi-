name: GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Dependensiyalarni o'rnatish
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GitHub Secrets → Settings → Secrets and variables → Actions da sozlang:
          #   VITE_SUPABASE_URL  = https://xxxx.supabase.co
          #   VITE_SUPABASE_ANON_KEY = eyJ...
          # Secret yo'q bo'lsa, .env faylidan o'qiladi (agar commit qilingan bo'lsa)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v4

      - name: Dist papkasini yuklash
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: GitHub Pages ga joylash
        uses: actions/deploy-pages@v4
        id: deployment
