<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Arab Fonetika Platformasi</title>
    <!-- `async` muhim: belgisiz holda bu skript HTML parsing'ni
         to'xtatib, telegram.org javob berguncha (yoki ba'zi tarmoqlarda
         umuman bloklangan bo'lsa, abadiy) butun ilovani BO'SH OQ EKRAN
         holida ushlab turardi — hattoki Telegram'dan tashqarida oddiy
         brauzerda ham. App.tsx/telegram.ts allaqachon `window.Telegram`
         mavjudligini ixtiyoriy zanjir (?.) bilan tekshiradi, shuning
         uchun bu skript kech yuklansa ham xavfsiz. -->
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    <script>
      // 404.html tomonidan yo'naltirilib kelganda URL ni tiklaydi
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" crossorigin src="/arabic-fanetika-platformasi-/assets/index-BvsyvHZi.js"></script>
    <link rel="stylesheet" crossorigin href="/arabic-fanetika-platformasi-/assets/index-DHwXsVrP.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Qo'riqchi: agar #root 8 soniyadan keyin ham bo'sh bo'lsa, demak
      // asosiy JS bundle umuman yuklanmagan (masalan, eski keshlangan
      // index.html endi mavjud bo'lmagan fayl nomiga ishora qilayotgan
      // bo'lishi mumkin) — foydalanuvchiga BO'SH OQ EKRAN o'rniga aniq
      // xabar va keshni tozalash yo'riqnomasini ko'rsatamiz.
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="min-height:100dvh;display:flex;flex-direction:column;' +
            'align-items:center;justify-content:center;gap:12px;padding:24px;' +
            'text-align:center;font-family:sans-serif;color:#333">' +
            '<div style="font-size:15px;max-width:360px">Ilova yuklanmadi. ' +
            'Iltimos, brauzer/Telegram keshini tozalang va sahifani qayta yuklang.</div>' +
            '<button onclick="location.reload(true)" style="padding:10px 20px;' +
            'border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:14px">' +
            'Qayta yuklash</button></div>';
        }
      }, 8000);
    </script>
  </body>
</html>
